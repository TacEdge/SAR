<!DOCTYPE html>
<html lang="en" data-domain="land">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SAROP Workspace — Prototype</title>

<!-- add-to-home-screen: launch standalone with a branded icon and title -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2B4721">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAROP">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shell.css">
</head>
<body>

<div class="body">
  <!-- mobile: a left-edge handle opens the module drawer; the module fills the screen -->
  <button class="navhandle" id="navHandle" type="button" aria-label="Open modules"><span>☰</span></button>
  <div class="navback" id="navBack"></div>

  <!-- left navigation: paging, module list, global domain toggle.
       The single top bar is each screen's own app bar. -->
  <nav class="nav" aria-label="Modules">
    <div class="brandbar"><img class="logo" src="assets/tacedge-logo.png" alt="TacEdge" width="1978" height="391"></div>
    <div class="pager" role="group" aria-label="Previous and next module">
      <button id="prevBtn" type="button" disabled>‹ Prev</button>
      <span class="step" id="stepLabel">—</span>
      <button id="nextBtn" type="button" disabled>Next ›</button>
    </div>
    <div class="navhead">Modules</div>
    <div id="navList"></div>
    <div class="navfoot">
      <span class="lab">Domain</span>
      <div class="seg" role="group" aria-label="Domain">
        <button data-dom="land" aria-pressed="true">Land</button>
        <button data-dom="marine" aria-pressed="false">Marine</button>
      </div>
    </div>
  </nav>

  <!-- central stage: iframe + landing panel -->
  <div class="stage">
    <iframe id="screenFrame" title="SAROP Workspace module"></iframe>
    <div class="landing" id="landing">
      <div class="card">
        <div class="brandband"><img class="logo" src="assets/tacedge-logo.png" alt="TacEdge" width="1978" height="391"></div>
        <div class="cardbody">
          <h1>SAROP Workspace</h1>
          <p>A clickable prototype of the single-operation workspace. Open any module from the left, or start at stand-up.</p>
          <button class="begin" id="beginBtn" type="button">Enter the workspace</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shell.js"></script>
</body>
</html>
